# Изолированный стенд для e2e-прогона: отдельный проект, свои порты, эфемерная БД.
# Не пересекается с дев-стеком из compose.yaml (8081/5432) — можно держать оба разом.
# Поднять вручную:  docker compose -f compose.e2e.yaml up -d --build --wait
# Погасить:         docker compose -f compose.e2e.yaml down -v
name: booking-e2e

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: booking
      POSTGRES_USER: booking
      POSTGRES_PASSWORD: booking
    ports:
      - "5433:5432"
    # tmpfs вместо volume: каждый up — чистый Postgres, между прогонами ничего не копится.
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking -d booking"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8082:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/booking
      DB_USER: booking
      DB_PASSWORD: booking
      OWNER_TZ: Asia/Yerevan
      WORKING_HOURS: "09:00-18:00"
      GRID_MINUTES: "15"
      BOOKING_HORIZON_DAYS: "14"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
