name: opencode-issue-triage

on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
    steps:
      - name: Check account age
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const user = await github.rest.users.getByUsername({
              username: context.payload.issue.user.login,
            });
            const created = new Date(user.data.created_at);
            const days = (Date.now() - created) / (1000 * 60 * 60 * 24);
            return days >= 30;
          result-encoding: string

      - name: Checkout repository
        if: steps.check.outputs.result == 'true'
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run opencode
        if: steps.check.outputs.result == 'true'
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode/deepseek-v4-pro
          prompt: |
            Review the newly opened issue in this repository.
            Respond in the same language as the issue.
            This workflow is for triage comments only.
            Do not edit files, create commits, create branches, open pull requests, or run long investigations.

            If the issue is clear and actionable:
            - Comment with a concise triage summary, likely area, and suggested next step.

            If the issue lacks enough information, comment with the specific details needed.
            If the issue is spam or unrelated to this project, do not comment.
