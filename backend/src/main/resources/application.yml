# Порт берётся из ${PORT} (требование учебной платформы — она запускает контейнер с -e PORT).
server:
  port: ${PORT:8080}

spring:
  application:
    name: booking
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/booking}
    username: ${DB_USER:booking}
    password: ${DB_PASSWORD:booking}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
  jooq:
    sql-dialect: postgres
  security:
    # Статическая конфигурация отключена — управляется кодом (SecurityConfig)
    user:
      name: disabled
      password: disabled

# Конфигурация инсталляции (переопределяется через env)
booking:
  owner-tz: ${OWNER_TZ:Asia/Yerevan}
  working-hours: ${WORKING_HOURS:09:00-18:00}
  grid-minutes: ${GRID_MINUTES:15}
  horizon-days: ${BOOKING_HORIZON_DAYS:14}

# Сгенерированные интерфейсы имеют @RequestMapping("${api.base-path:/api/v1}").
api:
  base-path: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /actuator
  endpoint:
    health:
      show-details: never
