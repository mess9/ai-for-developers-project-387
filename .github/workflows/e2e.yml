name: e2e

on:
  # Только на PR: GitHub гоняет тесты на merge-коммите (main + ветка),
  # то есть на том, что окажется в main. Повторный прогон после мержа
  # избыточен (и деплой триггерит Jenkins через Gitea, не GitHub-тесты).
  pull_request:
    branches:
      - main

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browser
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      # CI=true → globalSetup сам поднимет e2e-стек (compose.e2e.yaml: app + postgres)
      # через `docker compose up --build --wait`, globalTeardown погасит его.
      # Docker и docker compose предустановлены на ubuntu-latest.
      - name: Run e2e tests
        working-directory: e2e
        run: npm test
        env:
          CI: "true"

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
