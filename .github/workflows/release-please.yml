name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Конфиг: один релиз на весь репозиторий (release-type=simple),
          # версия и CHANGELOG.md в корне, тег вида vX.Y.Z.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
